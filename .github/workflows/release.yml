name: Build & Release

on:
  # Automatic: push a version tag like v1.0.2
  push:
    tags:
      - 'v*'
  # Manual: Actions → Build & Release → Run workflow
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without v prefix (e.g. 1.0.2). Leave empty to use package.json.'
        required: false
        type: string
      force_rebuild:
        description: 'Force rebuild & REPLACE binaries (changes file HASH and resets SmartScreen reputation). Keep OFF for normal releases.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      needs_build: ${{ steps.ver.outputs.needs_build }}
      skip_reason: ${{ steps.ver.outputs.skip_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version & hash-freeze check
        id: ver
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi

          TAG="v${VERSION}"
          # workflow_dispatch may set force_rebuild; tag pushes leave it empty → false
          FORCE="${{ inputs.force_rebuild }}"
          if [[ -z "${FORCE}" || "${FORCE}" == "null" ]]; then FORCE="false"; fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION} (tag ${TAG}), force_rebuild=${FORCE}"

          # If this version already has installer assets, do NOT rebuild by default.
          # Re-uploading the same filename with a new binary changes SHA-256 and resets
          # SmartScreen / reputation for that "EG Launcher x.y.z" file — like other indie
          # apps, ship each version ONCE and leave the hash frozen.
          HAS_WIN="false"
          HAS_LINUX="false"
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            ASSETS="$(gh release view "${TAG}" --repo "${{ github.repository }}" --json assets -q '.assets[].name' 2>/dev/null || true)"
            echo "Existing release assets:"
            echo "${ASSETS}"
            if echo "${ASSETS}" | grep -qiE 'setup\.exe$|\.exe$'; then HAS_WIN="true"; fi
            if echo "${ASSETS}" | grep -qiE '\.AppImage$'; then HAS_LINUX="true"; fi
          else
            echo "No release for ${TAG} yet."
          fi

          if [[ "${FORCE}" != "true" && "${HAS_WIN}" == "true" && "${HAS_LINUX}" == "true" ]]; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=Release ${TAG} already has Windows+Linux installers. Hash frozen. Use force_rebuild only if you intentionally want a new hash." >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping rebuild — preserving installer hashes for ${TAG}"
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            if [[ "${FORCE}" == "true" && ("${HAS_WIN}" == "true" || "${HAS_LINUX}" == "true") ]]; then
              echo "skip_reason=force_rebuild: will REPLACE existing assets (new hash)." >> "$GITHUB_OUTPUT"
              echo "::warning::force_rebuild is ON — SmartScreen file reputation for this version will reset."
            else
              echo "skip_reason=" >> "$GITHUB_OUTPUT"
            fi
          fi

  build-windows:
    name: Build Windows x64 (NSIS)
    needs: resolve-version
    if: needs.resolve-version.outputs.needs_build == 'true'
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        shell: bash
        run: npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build app (Vite + Electron compile)
        run: npm run build

      - name: Prepare self-signed code signing cert (optional secrets)
        id: csc
        shell: bash
        env:
          EG_CSC_PFX_BASE64: ${{ secrets.EG_CSC_PFX_BASE64 }}
          EG_CSC_PASSWORD: ${{ secrets.EG_CSC_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${EG_CSC_PFX_BASE64:-}" && -n "${EG_CSC_PASSWORD:-}" ]]; then
            mkdir -p certs
            echo "${EG_CSC_PFX_BASE64}" | base64 --decode > certs/eg-launcher-codesign.pfx
            echo "${EG_CSC_PASSWORD}" > certs/csc-password.txt
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Self-signed PFX restored from GitHub secrets (A1)."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::EG_CSC_PFX_BASE64 / EG_CSC_PASSWORD not set — Windows build will be UNSIGNED. Run npm run cert:generate locally and add those secrets."
          fi

      - name: Package Windows NSIS (electron-builder)
        shell: bash
        env:
          CI: 'true'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Signs with self-signed PFX when secrets were restored; else unsigned.
        run: |
          set -euo pipefail
          if [[ -f certs/eg-launcher-codesign.pfx && -f certs/csc-password.txt ]]; then
            export CSC_LINK="${GITHUB_WORKSPACE}/certs/eg-launcher-codesign.pfx"
            export WIN_CSC_LINK="${CSC_LINK}"
            export CSC_KEY_PASSWORD="$(cat certs/csc-password.txt)"
            export WIN_CSC_KEY_PASSWORD="${CSC_KEY_PASSWORD}"
            export CSC_IDENTITY_AUTO_DISCOVERY=true
            echo "Signing Windows build with self-signed cert (CN=EG Launcher)"
            npx electron-builder --win nsis --x64 --publish never
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            echo "Building UNSIGNED Windows installer (no EG_CSC_* secrets)"
            npx electron-builder --win nsis --x64 --config.win.signAndEditExecutable=false --publish never
          fi

      - name: Build standalone Windows uninstaller
        shell: bash
        env:
          CI: 'true'
        run: |
          set -euo pipefail
          if [[ -f certs/eg-launcher-codesign.pfx && -f certs/csc-password.txt ]]; then
            export CSC_LINK="${GITHUB_WORKSPACE}/certs/eg-launcher-codesign.pfx"
            export CSC_KEY_PASSWORD="$(cat certs/csc-password.txt)"
          fi
          node scripts/build-win-uninstaller.mjs --version "${{ needs.resolve-version.outputs.version }}"
          ls -la release/*uninstall* || true

      - name: List artifacts + SHA-256 (freeze this hash)
        shell: bash
        run: |
          ls -la release
          echo "=== SHA-256 (publish once, do not replace) ==="
          sha256sum release/*.{exe,yml,blockmap} 2>/dev/null || shasum -a 256 release/* || true

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eg-launcher-windows-x64
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux x64 (AppImage)
    needs: resolve-version
    if: needs.resolve-version.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        run: npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build app (Vite + Electron compile)
        run: npm run build

      - name: Package Linux AppImage (electron-builder)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CI: 'true'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux AppImage --x64 --publish never

      - name: List artifacts + SHA-256 (freeze this hash)
        run: |
          ls -la release
          echo "=== SHA-256 (publish once, do not replace) ==="
          sha256sum release/*.{AppImage,yml,blockmap} 2>/dev/null || sha256sum release/* || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eg-launcher-linux-x64
          path: |
            release/*.AppImage
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    needs: [resolve-version, build-windows, build-linux]
    # Run when we built, or when we skipped (to report freeze)
    if: always() && needs.resolve-version.result == 'success' && (needs.resolve-version.outputs.needs_build != 'true' || (needs.build-windows.result == 'success' && needs.build-linux.result == 'success'))
    runs-on: ubuntu-latest
    steps:
      - name: Hash frozen — nothing to upload
        if: needs.resolve-version.outputs.needs_build != 'true'
        run: |
          echo "${{ needs.resolve-version.outputs.skip_reason }}"
          echo "Release ${{ needs.resolve-version.outputs.tag }} installers are frozen (same SHA forever until force_rebuild)."

      - name: Checkout (for CHANGELOG.md)
        if: needs.resolve-version.outputs.needs_build == 'true'
        uses: actions/checkout@v4

      - name: Download all build artifacts
        if: needs.resolve-version.outputs.needs_build == 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build release notes from CHANGELOG.md
        if: needs.resolve-version.outputs.needs_build == 'true'
        id: notes
        shell: bash
        run: |
          node scripts/extract-changelog.mjs "${{ needs.resolve-version.outputs.version }}" release-notes.md
          echo "---- release-notes.md ----"
          cat release-notes.md

      - name: List files + SHA-256
        if: needs.resolve-version.outputs.needs_build == 'true'
        run: |
          find artifacts -type f | sort
          echo "=== SHA-256 ==="
          find artifacts -type f -print0 | xargs -0 sha256sum

      - name: Publish GitHub Release (first publish of this version)
        if: needs.resolve-version.outputs.needs_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: Release Version ${{ needs.resolve-version.outputs.version }}
          # Human changelog from CHANGELOG.md (not only auto-generated compare links)
          body_path: release-notes.md
          generate_release_notes: false
          # Live 2.x releases are public so already-installed launchers can auto-update via latest.yml.
          # Other major lines (e.g. 1.x) stay draft unless you change this.
          draft: ${{ !startsWith(needs.resolve-version.outputs.tag, 'v2.') }}
          prerelease: ${{ contains(needs.resolve-version.outputs.version, '-') }}
          # NSIS setup + AppImage + latest.yml / latest-linux.yml
          # IMPORTANT: Do not re-run with force_rebuild for the same version unless necessary.
          files: artifacts/*
          fail_on_unmatched_files: true
          make_latest: ${{ startsWith(needs.resolve-version.outputs.tag, 'v2.') && !contains(needs.resolve-version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
