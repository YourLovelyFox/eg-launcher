name: Build & Release

on:
  # Automatic: push a version tag like v1.0.1
  push:
    tags:
      - 'v*'
  # Manual: Actions → Build & Release → Run workflow
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without v prefix (e.g. 1.0.1). Leave empty to use package.json. Existing releases with the same tag are updated.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION} (tag v${VERSION})"

  build-windows:
    name: Build Windows x64 (NSIS)
    needs: resolve-version
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        shell: bash
        run: npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build app (Vite + Electron compile)
        run: npm run build

      - name: Package Windows NSIS (electron-builder)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CI: 'true'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Generates setup .exe + latest.yml (+ .blockmap) for electron-updater
        run: npx electron-builder --win nsis --x64 --config.win.signAndEditExecutable=false --publish never

      - name: List artifacts
        shell: bash
        run: ls -la release

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eg-launcher-windows-x64
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux x64 (AppImage)
    needs: resolve-version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        run: npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build app (Vite + Electron compile)
        run: npm run build

      - name: Package Linux AppImage (electron-builder)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CI: 'true'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Generates .AppImage + latest-linux.yml for electron-updater
        run: npx electron-builder --linux AppImage --x64 --publish never

      - name: List artifacts
        run: ls -la release

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eg-launcher-linux-x64
          path: |
            release/*.AppImage
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish / update GitHub Release
    needs: [resolve-version, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List files to publish
        run: find artifacts -type f | sort

      - name: Publish or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: EG Launcher ${{ needs.resolve-version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.resolve-version.outputs.version, '-') }}
          # NSIS setup + AppImage + latest.yml / latest-linux.yml for auto-update
          files: artifacts/*
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
