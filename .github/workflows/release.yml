name: Build & Release (Windows)

on:
  # Automatic: push a version tag like v1.0.1
  push:
    tags:
      - 'v*'
  # Manual: Actions → Build & Release → Run workflow
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without v prefix (e.g. 1.0.1). Leave empty to use package.json.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Build Windows package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Avoid interactive npm script prompts
          CI: 'true'
        run: npm run dist

      - name: List release artifacts
        shell: bash
        run: ls -la release || dir release

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: eg-launcher-windows-x64
          path: |
            release/*.zip
            release/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: EG Launcher ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
          files: |
            release/*.zip
            release/*.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
